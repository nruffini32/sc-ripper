<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SC Ripper</title>

  <!-- Open Graph — link previews in iMessage, Twitter, Slack, etc. -->
  <meta property="og:title" content="SC Ripper" />
  <meta property="og:description" content="Trim any SoundCloud track." />
  <meta property="og:image" content="https://sc-ripper.up.railway.app/static/og-image.png" />
  <meta property="og:type" content="website" />
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23ff5500'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  >
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Geist', 'system-ui', 'sans-serif'],
            mono: ['"Geist Mono"', 'ui-monospace', 'monospace'],
          },
          colors: {
            accent: { DEFAULT: '#ff5500', hover: '#ff6a1f' },
          },
        },
      },
    };
  </script>
  <style>
    body { font-feature-settings: "ss01", "cv11"; }
    .spinner { animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fade 0.2s ease-out; }
    @keyframes fade {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .glow {
      position: fixed; inset: 0; pointer-events: none; z-index: -1;
      background: radial-gradient(
        600px circle at 50% 30%,
        rgba(255, 85, 0, 0.06), transparent 70%
      );
    }
    input[type="checkbox"] { accent-color: #ff5500; }
  </style>
</head>
<body class="min-h-full bg-neutral-950 text-neutral-100 font-sans antialiased">
  <div class="glow"></div>

  <nav class="absolute top-0 inset-x-0 px-5 py-4 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="w-1.5 h-1.5 rounded-full bg-accent"></div>
      <span class="text-[12px] uppercase tracking-[0.2em] text-neutral-500 font-mono">
        sc ripper
      </span>
    </div>
    <div id="auth-state" class="text-[13px] text-neutral-500">
      <span class="opacity-50">•••</span>
    </div>
  </nav>

  <main class="min-h-screen flex items-center justify-center px-4 py-20">
    <div class="w-full max-w-md">

      <header class="mb-10">
        <h1 class="text-[28px] leading-tight font-semibold tracking-tight text-white">
          Trim any SoundCloud track.
        </h1>
        <p class="mt-2 text-[15px] text-neutral-400">
          Paste a link, pick two timestamps. Download the MP3, or upload it back to your SoundCloud.
        </p>
      </header>

      <form id="rip-form" class="space-y-4">
        <div>
          <label for="url" class="block text-[13px] font-medium text-neutral-300 mb-2">URL</label>
          <input
            id="url" name="url" type="url" required
            placeholder="https://soundcloud.com/..."
            class="w-full px-3.5 py-2.5 bg-neutral-900 border border-neutral-800 rounded-lg
                   text-[15px] text-white placeholder:text-neutral-600
                   focus:outline-none focus:border-neutral-600 focus:ring-1 focus:ring-neutral-600 transition"
          />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label for="start" class="block text-[13px] font-medium text-neutral-300 mb-2">Start</label>
            <input
              id="start" name="start" type="text" placeholder="1:35:35"
              class="w-full px-3.5 py-2.5 bg-neutral-900 border border-neutral-800 rounded-lg
                     text-[15px] text-white placeholder:text-neutral-600 font-mono
                     focus:outline-none focus:border-neutral-600 focus:ring-1 focus:ring-neutral-600 transition"
            />
          </div>
          <div>
            <label for="end" class="block text-[13px] font-medium text-neutral-300 mb-2">End</label>
            <input
              id="end" name="end" type="text" placeholder="1:40:04"
              class="w-full px-3.5 py-2.5 bg-neutral-900 border border-neutral-800 rounded-lg
                     text-[15px] text-white placeholder:text-neutral-600 font-mono
                     focus:outline-none focus:border-neutral-600 focus:ring-1 focus:ring-neutral-600 transition"
            />
          </div>
        </div>
        <p class="text-[12px] text-neutral-500">
          <span class="font-mono">HH:MM:SS</span> · <span class="font-mono">MM:SS</span> · or plain seconds
        </p>
        <button
          id="submit-btn" type="submit"
          class="w-full mt-2 px-4 py-2.5 bg-accent hover:bg-accent-hover
                 text-white text-[15px] font-medium rounded-lg
                 transition disabled:opacity-50 disabled:cursor-not-allowed"
        >
          Rip clip
        </button>
        <p class="mt-3 text-[12px] text-neutral-500 text-center">
          Then download or upload to SoundCloud.
        </p>
      </form>

      <div id="status" class="mt-6 hidden"></div>

      <footer class="mt-12 text-[12px] text-neutral-600 text-center">
        Personal use — respect copyright.
      </footer>
    </div>
  </main>

  <script>
    const form      = document.getElementById('rip-form');
    const submitBtn = document.getElementById('submit-btn');
    const statusEl  = document.getElementById('status');
    const authEl    = document.getElementById('auth-state');

    const PHASE_LABELS = {
      queued:      'Queued…',
      downloading: 'Downloading source…',
      cutting:     'Cutting clip…',
    };
    const PHASE_PROGRESS = {
      queued:      0,
      downloading: null,   // real value from server
      cutting:     100,
    };

    let pollTimer       = null;
    let uploadPollTimer = null;
    let authState       = { connected: false };
    let currentJobId    = null;

    const esc = (s) => String(s).replace(/[&<>"]/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

    // ---------- auth ----------

    async function loadAuthState() {
      try {
        const r = await fetch('/me', { credentials: 'same-origin' });
        authState = await r.json();
      } catch { authState = { connected: false }; }
      renderAuth();
      // If a job is in "ready" state, re-render to show/hide the upload panel.
      if (currentJobId) {
        const s = await fetchStatus(currentJobId);
        if (s && s.status === 'ready') showReady(currentJobId, s);
      }
    }

    function renderAuth() {
      if (authState.connected) {
        const avatar = authState.avatar_url
          ? `<img src="${esc(authState.avatar_url)}" class="w-5 h-5 rounded-full"/>`
          : `<div class="w-5 h-5 rounded-full bg-accent/30"></div>`;
        authEl.innerHTML = `
          <div class="flex items-center gap-2">
            ${avatar}
            <span class="text-neutral-400">${esc(authState.username)}</span>
            <button id="logout" class="text-neutral-600 hover:text-neutral-400 ml-1">disconnect</button>
          </div>
        `;
        document.getElementById('logout').addEventListener('click', async () => {
          await fetch('/logout', { method: 'POST', credentials: 'same-origin' });
          authState = { connected: false };
          renderAuth();
          if (currentJobId) fetchStatus(currentJobId).then(s => {
            if (s && s.status === 'ready') showReady(currentJobId, s);
          });
        });
      } else {
        authEl.innerHTML = `
          <a href="/connect"
             class="px-3 py-1.5 bg-neutral-900 hover:bg-neutral-800 border border-neutral-800
                    text-neutral-300 text-[12px] rounded-md transition">
            Connect SoundCloud
          </a>
        `;
      }
    }

    // ---------- rip ----------

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const startVal = document.getElementById('start').value.trim();
      const endVal   = document.getElementById('end').value.trim();

      if (!startVal && !endVal) {
        if (!confirm('No timestamps entered — download the entire track?')) return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Working…';
      showPhase('queued', 0);

      const body = {
        url:   document.getElementById('url').value,
        start: startVal,
        end:   endVal,
      };

      let res, data;
      try {
        res = await fetch('/rip', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        data = await res.json();
      } catch { finish('error', 'network error'); return; }

      if (!res.ok) { finish('error', data.detail || 'request failed'); return; }
      currentJobId = data.job_id;
      pollRipStatus(data.job_id);
    });

    async function fetchStatus(jobId) {
      try {
        const r = await fetch(`/status/${jobId}`);
        return await r.json();
      } catch { return null; }
    }

    function pollRipStatus(jobId) {
      clearInterval(pollTimer);
      pollTimer = setInterval(async () => {
        const data = await fetchStatus(jobId);
        if (!data) return;
        if (data.status === 'ready') {
          clearInterval(pollTimer);
          showReady(jobId, data);
          resetButton();
        } else if (data.status === 'failed') {
          clearInterval(pollTimer);
          finish('error', data.error || 'failed');
        } else {
          showPhase(data.status, data.progress);
        }
      }, 500);
    }

    function resetButton() {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Rip clip';
    }

    function finish(kind, msg) {
      if (kind === 'error') showError(msg);
      resetButton();
    }

    function showPhase(phase, serverPct) {
      const label = PHASE_LABELS[phase] || phase;
      let pct, pctLabel;
      if (phase === 'downloading') {
        pct = serverPct != null ? serverPct : 0;
        pctLabel = pct > 0 ? `${pct}%` : '';
      } else {
        pct = PHASE_PROGRESS[phase] ?? 0;
        pctLabel = '';
      }
      statusEl.className = 'mt-6 p-4 bg-neutral-900 border border-neutral-800 rounded-lg fade-in';
      statusEl.innerHTML = `
        <div class="flex items-center gap-3 mb-3">
          <div class="spinner w-4 h-4 border-2 border-neutral-700 border-t-accent rounded-full flex-shrink-0"></div>
          <span class="text-[14px] text-neutral-300 flex-1">${esc(label)}</span>
          <span class="text-[13px] font-mono text-neutral-500">${pctLabel}</span>
        </div>
        <div class="w-full h-1 bg-neutral-800 rounded-full overflow-hidden">
          <div class="h-full bg-accent rounded-full transition-all duration-300"
               style="width: ${pct}%"></div>
        </div>
      `;
    }

    function showError(msg) {
      statusEl.className = 'mt-6 p-4 bg-red-950/40 border border-red-900/60 rounded-lg fade-in';
      statusEl.innerHTML = `
        <div class="flex items-start gap-2">
          <svg class="w-4 h-4 text-red-400 flex-shrink-0 mt-0.5" fill="none"
               viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/>
          </svg>
          <p class="text-[13px] text-red-300">${esc(msg)}</p>
        </div>
      `;
    }

    // ---------- ready + upload ----------

    function showReady(jobId, data) {
      currentJobId = jobId;
      const defaultTitle = data.filename.replace(/\.mp3$/, '');
      const warnings = (data.warnings || []).map(w =>
        `<p class="text-[12px] text-amber-400/80 mt-1.5">⚠ ${esc(w)}</p>`
      ).join('');

      statusEl.className =
        'mt-6 bg-neutral-900 border border-neutral-800 rounded-lg fade-in overflow-hidden';
      statusEl.innerHTML = `
        <div class="p-4">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0 flex-1">
              <div class="flex items-center gap-2">
                <svg class="w-4 h-4 text-accent flex-shrink-0" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                </svg>
                <span class="text-[14px] font-medium text-white">Ready</span>
              </div>
              <p class="mt-1.5 text-[13px] text-neutral-400 truncate" title="${esc(data.filename)}">
                ${esc(data.filename)}
              </p>
              ${warnings}
            </div>
            <a href="/download/${jobId}"
               class="flex-shrink-0 px-3 py-1.5 bg-white hover:bg-neutral-200
                      text-black text-[13px] font-medium rounded-md transition">
              Download
            </a>
          </div>
        </div>
        ${renderUploadPanel(jobId, defaultTitle, data)}
      `;
      wireUploadPanel(jobId, data);
    }

    function renderUploadPanel(jobId, defaultTitle, data) {
      if (data.upload_status === 'uploading') {
        return `
          <div class="p-4 border-t border-neutral-800 flex items-center gap-3">
            <div class="spinner w-4 h-4 border-2 border-neutral-700 border-t-accent rounded-full"></div>
            <span class="text-[13px] text-neutral-300">Uploading to SoundCloud…</span>
          </div>
        `;
      }
      if (data.upload_status === 'uploaded' && data.upload_url) {
        return `
          <div class="p-4 border-t border-neutral-800 flex items-center justify-between gap-3">
            <div class="flex items-center gap-2 min-w-0">
              <svg class="w-4 h-4 text-accent flex-shrink-0" fill="none"
                   viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
              </svg>
              <span class="text-[13px] text-neutral-300 truncate">Uploaded to SoundCloud</span>
            </div>
            <a href="${esc(data.upload_url)}" target="_blank" rel="noopener"
               class="flex-shrink-0 px-3 py-1.5 bg-neutral-800 hover:bg-neutral-700
                      text-white text-[13px] rounded-md transition">
              Open ↗
            </a>
          </div>
        `;
      }
      if (data.upload_status === 'failed') {
        return `
          <div class="p-4 border-t border-neutral-800 bg-red-950/20">
            <p class="text-[12px] text-red-300 mb-2">⚠ Upload failed: ${esc(data.upload_error || '')}</p>
            ${authState.connected ? renderUploadForm(defaultTitle) : renderConnectCta()}
          </div>
        `;
      }
      if (!authState.connected) {
        return `<div class="p-4 border-t border-neutral-800">${renderConnectCta()}</div>`;
      }
      return `<div class="p-4 border-t border-neutral-800 space-y-3">${renderUploadForm(defaultTitle)}</div>`;
    }

    function renderConnectCta() {
      return `
        <div class="flex items-center justify-between gap-3">
          <p class="text-[13px] text-neutral-400">Connect to upload to your SoundCloud.</p>
          <a href="/connect"
             class="flex-shrink-0 px-3 py-1.5 bg-accent hover:bg-accent-hover
                    text-white text-[13px] font-medium rounded-md transition">
            Connect
          </a>
        </div>
      `;
    }

    function renderUploadForm(defaultTitle) {
      return `
        <div>
          <label class="block text-[12px] font-medium text-neutral-400 mb-1.5">Title</label>
          <input id="upload-title" type="text" value="${esc(defaultTitle)}"
            class="w-full px-3 py-2 bg-neutral-950 border border-neutral-800 rounded-md
                   text-[13px] text-white focus:outline-none focus:border-neutral-600 transition">
        </div>
        <div>
          <label class="block text-[12px] font-medium text-neutral-400 mb-1.5">Artwork <span class="text-neutral-600 font-normal">(optional)</span></label>
          <div class="flex items-center gap-3">
            <label class="flex-1 flex items-center gap-2 px-3 py-2 bg-neutral-950 border border-neutral-800 rounded-md
                          text-[13px] text-neutral-500 cursor-pointer hover:border-neutral-600 transition">
              <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
              </svg>
              <span id="artwork-label">Choose image…</span>
              <input id="upload-artwork" type="file" accept="image/jpeg,image/png,image/jpg" class="hidden">
            </label>
            <div id="artwork-preview" class="hidden w-10 h-10 rounded overflow-hidden flex-shrink-0 border border-neutral-700">
              <img id="artwork-img" src="" class="w-full h-full object-cover">
            </div>
          </div>
        </div>
        <div class="flex items-center justify-between gap-3">
          <label class="flex items-center gap-2 text-[13px] text-neutral-400 cursor-pointer">
            <input id="upload-private" type="checkbox" checked>
            Private
          </label>
          <button id="upload-btn"
            class="px-3 py-1.5 bg-accent hover:bg-accent-hover
                   text-white text-[13px] font-medium rounded-md transition">
            Upload to SoundCloud
          </button>
        </div>
      `;
    }

    function wireUploadPanel(jobId, data) {
      const artworkInput = document.getElementById('upload-artwork');
      if (artworkInput) {
        artworkInput.addEventListener('change', () => {
          const file = artworkInput.files[0];
          if (!file) return;
          document.getElementById('artwork-label').textContent = file.name;
          const preview = document.getElementById('artwork-preview');
          const img = document.getElementById('artwork-img');
          const objUrl = URL.createObjectURL(file);
          img.onload = () => URL.revokeObjectURL(objUrl);
          img.src = objUrl;
          preview.classList.remove('hidden');
        });
      }

      const btn = document.getElementById('upload-btn');
      if (!btn) return;
      btn.addEventListener('click', async () => {
        const titleInput = document.getElementById('upload-title');
        const privateInput = document.getElementById('upload-private');
        const artworkFile = artworkInput && artworkInput.files[0];

        const form = new FormData();
        form.append('title', titleInput.value.trim() || data.filename.replace(/\.mp3$/, ''));
        form.append('private', privateInput.checked ? 'true' : 'false');
        if (artworkFile) form.append('artwork', artworkFile, artworkFile.name);

        btn.disabled = true;
        btn.textContent = 'Starting…';
        let res, payload;
        try {
          res = await fetch(`/upload/${jobId}`, {
            method: 'POST',
            credentials: 'same-origin',
            body: form,
          });
          payload = await res.json();
        } catch {
          btn.disabled = false; btn.textContent = 'Upload to SoundCloud';
          return;
        }
        if (!res.ok) {
          btn.disabled = false; btn.textContent = 'Upload to SoundCloud';
          showError(payload.detail || 'upload failed to start');
          return;
        }
        pollUploadStatus(jobId);
      });
    }

    function pollUploadStatus(jobId) {
      clearInterval(uploadPollTimer);
      uploadPollTimer = setInterval(async () => {
        const data = await fetchStatus(jobId);
        if (!data) return;
        if (['uploaded', 'failed'].includes(data.upload_status)) {
          clearInterval(uploadPollTimer);
        }
        showReady(jobId, data);
      }, 1000);
    }

    // ---------- init ----------

    loadAuthState();
  </script>
</body>
</html>
